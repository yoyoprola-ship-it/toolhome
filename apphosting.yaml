# Firebase App Hosting config para toolhome.
# Los secrets viven en el MISMO Firebase project que Lafayette Market
# (lafayette-market-d64ff) → reutilizamos los secrets ya creados.
#
# Los env vars NEXT_PUBLIC_* se INLINEAN en el bundle del cliente
# durante el build → deben estar disponibles en BUILD (además de
# RUNTIME para server components).

runConfig:
  minInstances: 0
  maxInstances: 3
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  timeoutSeconds: 60

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  # ─── Resend (email) — compartidos con Lafayette + Rudewear ─
  # Se usan para 2FA del admin: después del SMS verify (Firebase
  # Phone Auth), se manda un código 6-dígitos al email del admin.
  # Endpoint: app/api/admin/2fa-send/route.ts
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  - variable: EMAIL_FROM
    secret: EMAIL_FROM
    availability:
      - RUNTIME

  # ─── Internal secret — hash del 6-digit email code ────────
  - variable: INTERNAL_API_SECRET
    secret: INTERNAL_API_SECRET
    availability:
      - RUNTIME
